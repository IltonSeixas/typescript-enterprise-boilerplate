syntax = "proto3";

package boilerplate.v1;

// Mirrors the REST authentication endpoints under /api/v1/auth.
// Unlike REST, gRPC has no cookie mechanism, so the refresh token travels
// in the response body and must be stored securely by the caller.
service AuthService {
  rpc Register(RegisterRequest) returns (UserResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
}

// Mirrors the REST user endpoints under /api/v1/users.
// Every RPC requires an `authorization: Bearer <access_token>` request metadata entry.
service UserService {
  rpc GetMe(GetMeRequest) returns (UserResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ChangeRole(ChangeRoleRequest) returns (UserResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  string token_type = 3;
  int32 expires_in = 4;
}

message GetMeRequest {}

message UpdateProfileRequest {
  string name = 1;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message ChangeRoleRequest {
  string user_id = 1;
  string role = 2;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
  bool is_active = 5;
  string created_at = 6;
  string updated_at = 7;
}
